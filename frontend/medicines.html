<!DOCTYPE html>
<html>

<head>
<title>Medicines Management</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#f4f6f9;
}

h2{
margin-bottom:10px;
}

.form{
margin-bottom:20px;
}

input{
padding:10px;
margin:5px;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
}

.addBtn{
background:#28a745;
color:white;
}

.deleteBtn{
background:red;
color:white;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#eee;
}

</style>

</head>

<body>

<h2>💊 Medicines Management</h2>

<div class="form">

<input id="name" placeholder="Medicine Name">

<input id="qty" type="number" placeholder="Quantity">

<input id="price" type="number" placeholder="Price">

<input id="expiry" type="date">

<button class="addBtn" onclick="addMedicine()">Add Medicine</button>

</div>


<table id="table">

<tr>
<th>Name</th>
<th>Stock</th>
<th>Price</th>
<th>Expiry</th>
<th>Action</th>
</tr>

</table>


<script>


async function load(){

let res = await fetch("http://127.0.0.1:8010/medicines")

let data = await res.json()

let table = document.getElementById("table")

table.innerHTML = `
<tr>
<th>Name</th>
<th>Stock</th>
<th>Price</th>
<th>Expiry</th>
<th>Action</th>
</tr>
`

data.forEach(m => {

table.innerHTML += `
<tr>
<td>${m.name}</td>
<td>${m.quantity}</td>
<td>₹ ${m.selling_price}</td>
<td>${m.expiry_date || "-"}</td>
<td>
<button class="deleteBtn" onclick="deleteMedicine(${m.id})">
Delete
</button>
</td>
</tr>
`

})

}



async function addMedicine(){

let name = document.getElementById("name").value
let qty = parseInt(document.getElementById("qty").value)
let price = parseFloat(document.getElementById("price").value)
let expiry = document.getElementById("expiry").value

if(!name || !qty || !price){
alert("Please fill all fields")
return
}

await fetch("http://127.0.0.1:8010/medicines",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name:name,
quantity:qty,
selling_price:price,
expiry_date:expiry
})

})

document.getElementById("name").value=""
document.getElementById("qty").value=""
document.getElementById("price").value=""
document.getElementById("expiry").value=""

load()

}



async function deleteMedicine(id){

if(!confirm("Delete this medicine?")) return

await fetch("http://127.0.0.1:8010/medicines/"+id,{
method:"DELETE"
})

load()

}



load()

</script>

</body>
</html>
