<!DOCTYPE html>
<html>

<head>

<title>Customers</title>

<style>

body{
font-family:Arial;
background:#f4f7fb;
margin:0;
}

.header{
background:#1e293b;
color:white;
padding:15px 25px;
font-size:22px;
}

.container{
padding:30px;
}

input{
padding:12px;
margin:5px;
border:2px solid #e2e8f0;
border-radius:8px;
}

button{
padding:12px 20px;
background:#16a34a;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
background:white;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="header">
👨‍⚕️ Customers
</div>

<div class="container">

<h2>Add Customer</h2>

<input id="name" placeholder="Customer Name">

<input id="phone" placeholder="Phone Number">

<button onclick="addCustomer()">
Add Customer
</button>


<h2>Customer List</h2>

<table id="customerTable">

<tr>
<th>Name</th>
<th>Phone</th>
</tr>

</table>

</div>

<script>

async function addCustomer(){

let data = {

name:document.getElementById("name").value,
phone:document.getElementById("phone").value

}

await fetch("http://127.0.0.1:8010/customers",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(data)

})

alert("Customer Added")

loadCustomers()

}


async function loadCustomers(){

let response = await fetch("http://127.0.0.1:8010/customers")

let customers = await response.json()

let table = document.getElementById("customerTable")

table.innerHTML = `
<tr>
<th>Name</th>
<th>Phone</th>
</tr>
`

customers.forEach(c=>{

table.innerHTML += `
<tr>
<td>${c.name}</td>
<td>${c.phone}</td>
</tr>
`

})

}

loadCustomers()

</script>

</body>
</html>
